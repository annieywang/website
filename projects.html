<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects — Annie Wang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #C4D6FF;
    --ink: #1B1A17;
    --muted: #4A5570;
    --line: #A9BEEF;
    --pine: #2F4A44;
    --gold: #B8860B;
    --paper: #D8E3FF;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{
    max-width: 960px;
    margin: 0 auto;
    padding: 0 48px;
  }

  header{
    padding: 36px 0 28px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }

  nav{ display:flex; gap: 22px; }
  nav a{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration:none;
    padding-bottom: 3px;
    border-bottom: 1px solid transparent;
    transition: color .2s ease, border-color .2s ease;
  }
  nav a:hover, nav a.active{
    color: var(--ink);
    border-color: var(--pine);
  }

  .projects-list{
    padding: 20px 0 60px;
    display:flex;
    flex-direction: column;
    gap: 56px;
  }

  .project-row{
    display:flex;
    align-items:center;
    gap: 40px;
  }
  .project-row.reverse{
    flex-direction: row-reverse;
  }

  .project-photo{
    width: 220px;
    height: 220px;
    flex-shrink: 0;
    border: 2px solid var(--ink);
    border-radius: 10px;
    overflow: hidden;
    background: var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--muted);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .project-photo img{
    width:100%; height:100%; object-fit: cover; display:block;
  }

  .project-caption{ flex: 1; min-width: 240px; }
  .project-title{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin: 0 0 8px;
  }
  .project-desc{
    color: var(--ink);
    margin: 0;
    font-size: 16px;
  }

  @media (max-width: 640px){
    .project-row, .project-row.reverse{
      flex-direction: column;
      align-items: flex-start;
    }
    .project-photo{ width: 100%; height: auto; aspect-ratio: 4/3; }
  }

  @media (prefers-reduced-motion: reduce){
    * { transition: none !important; scroll-behavior: auto !important; }
  }

  :focus-visible{ outline: 2px solid var(--pine); outline-offset: 3px; }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <nav>
      <a href="index.html">About</a>
      <a href="projects.html" class="active">Projects</a>
    </nav>
  </header>

  <div class="projects-list">

    <div class="project-row">
      <div class="project-photo">photo</div>
      <div class="project-caption">
        <p class="project-title">Project One</p>
        <p class="project-desc">Describe what this project is, what you built, and what tools you used.</p>
      </div>
    </div>

    <div class="project-row reverse">
      <div class="project-photo">photo</div>
      <div class="project-caption">
        <p class="project-title">Project Two</p>
        <p class="project-desc">Describe what this project is, what you built, and what tools you used.</p>
      </div>
    </div>

    <div class="project-row">
      <div class="project-photo">photo</div>
      <div class="project-caption">
        <p class="project-title">Project Three</p>
        <p class="project-desc">Describe what this project is, what you built, and what tools you used.</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
